name: Fiyat Güncelle
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python update_prices.py
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
      - run: |
          git config user.email "bot@bot.com"
          git config user.name "bot"
          git add prices.json
          git diff --staged --quiet || git commit -m "fiyat guncellendi"
          git push

name: Fiyat Güncelle

on:
  schedule:
    - cron: '0 2 * * *'  # Her gün gece 02:00 UTC (05:00 TR)
  workflow_dispatch:       # Manuel çalıştırma butonu

jobs:
  update-prices:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Repoyu İndir
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Kütüphaneleri Yükle
        run: pip install requests

      - name: Fiyatları Güncelle
        run: python update_prices.py

      - name: prices.json'u Kaydet
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "PC Ustası Bot"
          git add prices.json
          git diff --quiet && git diff --staged --quiet || git commit -m "💰 Fiyatlar güncellendi - $(date +'%d.%m.%Y %H:%M')"
          git push

